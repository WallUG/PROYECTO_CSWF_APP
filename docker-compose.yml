version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://backend
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8080:80'
    environment:
      - DB_HOST=mysql
      - DB_NAME=pruebascsf
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      - mysql
    volumes:
      - ./backend:/var/www/backend

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pruebascsf
    volumes:
      - mysql-data:/var/lib/mysql
      - './mysql/SISTEMA DE GESTIÓN DE TALLER.sql:/docker-entrypoint-initdb.d/init.sql:ro'
    ports:
      - '3306:3306'

volumes:
  mysql-data:
